name: Playwright Agendado

on:
  schedule:
    # Executa todo dia às 08:00 UTC (05:00 Brasília)
    - cron: '0 8 * * *'
  # Permite executar manualmente pelo GitHub Actions
  workflow_dispatch:

jobs:
  playwright-tests:
    name: Executar testes Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Instalar navegadores do Playwright
        run: npx playwright install --with-deps chromium

      - name: Executar testes Playwright
        run: npx playwright test

      - name: Salvar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
